name: Responsive Browser Audit

on:
  pull_request:
  push:
    branches:
      - test/responsive-browser-audit

jobs:
  responsive-browser-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Prepare responsive Docker environment
        run: |
          cp .env.example .env.responsive
          sed -i 's#^APP_URL=.*#APP_URL=http://localhost:8080#' .env.responsive
          sed -i 's#^DOCKER_APP_URL=.*#DOCKER_APP_URL=http://localhost:8080#' .env.responsive
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env.responsive
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env.responsive

          DB_PASSWORD="$(openssl rand -hex 24)"
          ROOT_PASSWORD="$(openssl rand -hex 24)"
          sudo install -d -m 750 /etc/oasis-hotel
          sudo tee /etc/oasis-hotel/database.env >/dev/null <<EOF
          MARIADB_DATABASE=oasis_hotel
          MARIADB_USER=oasis_hotel
          MARIADB_PASSWORD=${DB_PASSWORD}
          MARIADB_ROOT_PASSWORD=${ROOT_PASSWORD}
          DB_DATABASE=oasis_hotel
          DB_USERNAME=oasis_hotel
          DB_PASSWORD=${DB_PASSWORD}
          EOF
          sudo chmod 640 /etc/oasis-hotel/database.env
          sudo chown root:$(id -gn) /etc/oasis-hotel/database.env

      - name: Deploy full application stack
        run: OASIS_ENV_FILE="$PWD/.env.responsive" bash ./deploy.sh

      - name: Create temporary browser audit accounts
        run: |
          AUDIT_PASSWORD="$(openssl rand -hex 24)"
          echo "AUDIT_ADMIN_EMAIL=audit-admin@example.test" >> "$GITHUB_ENV"
          echo "AUDIT_ADMIN_PASSWORD=${AUDIT_PASSWORD}" >> "$GITHUB_ENV"
          echo "AUDIT_MANAGER_EMAIL=audit-manager@example.test" >> "$GITHUB_ENV"
          echo "AUDIT_MANAGER_PASSWORD=${AUDIT_PASSWORD}" >> "$GITHUB_ENV"
          echo "AUDIT_RECEPTIONIST_EMAIL=audit-receptionist@example.test" >> "$GITHUB_ENV"
          echo "AUDIT_RECEPTIONIST_PASSWORD=${AUDIT_PASSWORD}" >> "$GITHUB_ENV"
          echo "AUDIT_GUEST_EMAIL=audit-guest@example.test" >> "$GITHUB_ENV"
          echo "AUDIT_GUEST_PASSWORD=${AUDIT_PASSWORD}" >> "$GITHUB_ENV"

          OASIS_ENV_FILE="$PWD/.env.responsive" docker compose --env-file .env.responsive exec -T \
            -e AUDIT_PASSWORD="${AUDIT_PASSWORD}" web1 php artisan tinker --execute="
              foreach ([
                'admin' => 'audit-admin@example.test',
                'manager' => 'audit-manager@example.test',
                'receptionist' => 'audit-receptionist@example.test',
                'guest' => 'audit-guest@example.test',
              ] as \$role => \$email) {
                App\\Models\\User::updateOrCreate(
                  ['email' => \$email],
                  [
                    'name' => 'Responsive Audit ' . ucfirst(\$role),
                    'password' => Illuminate\\Support\\Facades\\Hash::make(getenv('AUDIT_PASSWORD')),
                    'email_verified_at' => now(),
                    'role' => \$role,
                    'account_status' => 'active',
                  ]
                );
              }
            "

      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --disable-pip-version-check playwright==1.55.0
          python3 -m playwright install --with-deps chromium

      - name: Audit desktop tablet and mobile layouts
        id: browser_audit
        continue-on-error: true
        run: python3 scripts/responsive-audit.py 2>&1 | tee responsive-audit-output.txt

      - name: Upload responsive audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-browser-audit
          path: |
            responsive-audit-output.txt
            responsive-audit-artifacts/
          if-no-files-found: error
          retention-days: 5

      - name: Tear down Docker stack
        if: always()
        run: OASIS_ENV_FILE="$PWD/.env.responsive" docker compose --env-file .env.responsive down -v --remove-orphans || true

      - name: Fail when responsive audit finds errors
        if: steps.browser_audit.outcome == 'failure'
        run: exit 1
