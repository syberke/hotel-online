name: Laravel Dynamic Data Validation

on:
  pull_request:
  push:
    branches:
      - main
      - fix/dynamic-data

jobs:
  laravel-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, gd, pdo_sqlite, zip
          coverage: none

      - name: Validate Composer metadata and PHP syntax
        run: |
          composer validate --no-check-publish --quiet
          find app bootstrap config database routes -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l >/dev/null

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          mkdir -p database storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache
          touch database/database.sqlite
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i "s#^DB_DATABASE=.*#DB_DATABASE=${GITHUB_WORKSPACE}/database/database.sqlite#" .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          sed -i 's/^MAIL_MAILER=.*/MAIL_MAILER=array/' .env
          php artisan key:generate --force --quiet

      - name: Validate migrations routes and Blade compilation
        run: |
          php artisan migrate --force --quiet
          php artisan route:list >/dev/null
          php artisan view:cache --quiet

      - name: Run Laravel feature tests
        id: laravel_tests
        continue-on-error: true
        run: php artisan test --stop-on-failure > test-output.txt 2>&1

      - name: Upload feature test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-test-output
          path: test-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail validation when feature tests fail
        if: steps.laravel_tests.outcome == 'failure'
        run: exit 1
