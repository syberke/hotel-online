name: PHP Syntax Check

on:
  pull_request:
  push:
    branches:
      - main
      - fix/dynamic-data

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Lint application PHP
        run: |
          find app bootstrap config database routes -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l
