name: Code Health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint application PHP
        run: find app config routes tests database/migrations database/seeders -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run receipt regression test
        run: php artisan test --filter=RoomReceiptRouteTest

      - name: Run operational content regression test
        run: php artisan test --filter=OperationalContentRoutesTest
