name: Operations and Report Validation

on:
  pull_request:
  push:
    branches:
      - fix/operations-reports-polish
      - fix/core-schema-enums
      - main

jobs:
  postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: oasis_test
          POSTGRES_USER: oasis
          POSTGRES_PASSWORD: oasis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oasis -d oasis_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, gd, pdo_pgsql, zip
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies and assets
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci --no-audit --no-fund
          npm run build

      - name: Prepare PostgreSQL environment
        run: |
          cp .env.example .env
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=oasis_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=oasis/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=oasis/' .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          php artisan key:generate --force

      - name: Migrate seed and verify PostgreSQL native enums
        run: |
          php artisan migrate:fresh --seed --force
          php scripts/verify-database-enums.php

      - name: Validate routes and Blade
        run: |
          php artisan route:list >/dev/null
          php artisan view:cache

      - name: Run PostgreSQL operational feature validation
        id: postgres_tests
        continue-on-error: true
        run: |
          php artisan test \
            tests/Feature/OperationsReportPolishTest.php \
            tests/Feature/CoreSchemaWorkflowTest.php \
            --stop-on-failure > postgres-test-output.txt 2>&1

      - name: Upload PostgreSQL test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operations-test-postgres
          path: postgres-test-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail PostgreSQL validation when tests fail
        if: steps.postgres_tests.outcome == 'failure'
        run: exit 1

  mariadb:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: oasis_test
          MARIADB_USER: oasis
          MARIADB_PASSWORD: oasis
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h localhost -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, gd, pdo_mysql, zip
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies and assets
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci --no-audit --no-fund
          npm run build

      - name: Prepare MariaDB environment
        run: |
          cp .env.example .env
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=oasis_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=oasis/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=oasis/' .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          php artisan key:generate --force

      - name: Migrate seed and verify MariaDB native ENUM columns
        run: |
          php artisan migrate:fresh --seed --force
          php scripts/verify-database-enums.php

      - name: Validate routes and Blade
        run: |
          php artisan route:list >/dev/null
          php artisan view:cache

      - name: Run MariaDB operational feature validation
        id: mariadb_tests
        continue-on-error: true
        run: |
          php artisan test \
            tests/Feature/OperationsReportPolishTest.php \
            tests/Feature/CoreSchemaWorkflowTest.php \
            --stop-on-failure > mariadb-test-output.txt 2>&1

      - name: Upload MariaDB test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operations-test-mariadb
          path: mariadb-test-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail MariaDB validation when tests fail
        if: steps.mariadb_tests.outcome == 'failure'
        run: exit 1
