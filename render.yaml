services:
  - type: web
    name: oasis-hotel
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: php artisan migrate --force
    initialDeployHook: php artisan db:seed --class=RenderProductionSeeder --force
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Oasis Hotel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: RENDER_APP_SECRET
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: oasis-hotel-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: CACHE_PREFIX
        value: oasis_hotel_
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: MIDTRANS_SERVER_KEY
        sync: false
      - key: MIDTRANS_CLIENT_KEY
        sync: false
      - key: MIDTRANS_IS_PRODUCTION
        value: "false"
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: MAIL_MAILER
        value: log

databases:
  - name: oasis-hotel-db
    plan: free
    region: singapore
    databaseName: oasis_hotel
    user: oasis_hotel
    ipAllowList: []
