<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0a0a">
    <title>Oasis Hotel Offline</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #f5f5f3;
            color: #171717;
            font-family: Arial, Helvetica, sans-serif;
        }
        main {
            width: min(100%, 560px);
            background: #fff;
            border: 1px solid #e5e5e5;
            padding: 40px;
            text-align: center;
        }
        .mark {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: #0a0a0a;
            color: #d4a72c;
            font: italic 42px Georgia, "Times New Roman", serif;
        }
        .eyebrow {
            margin: 0 0 10px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: #a16207;
        }
        h1 {
            margin: 0;
            font: 400 34px Georgia, "Times New Roman", serif;
        }
        p {
            margin: 16px auto 0;
            max-width: 430px;
            color: #737373;
            font-size: 14px;
            line-height: 1.7;
        }
        button {
            margin-top: 28px;
            border: 0;
            background: #0a0a0a;
            color: #fff;
            padding: 13px 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
            cursor: pointer;
        }
        small {
            display: block;
            margin-top: 18px;
            color: #a3a3a3;
            line-height: 1.5;
        }
        @media (max-width: 520px) {
            main { padding: 32px 22px; }
            h1 { font-size: 29px; }
        }
    </style>
</head>
<body>
    <main>
        <div class="mark">O</div>
        <p class="eyebrow">Offline Mode</p>
        <h1>Connection unavailable</h1>
        <p>
            Previously opened public pages can still be available from the device cache.
            Booking, payment, check-in, and hotel staff operations require an active server connection.
        </p>
        <button type="button" onclick="window.location.reload()">Try Again</button>
        <small>Oasis Hotel &amp; Resort · PWA Offline Fallback</small>
    </main>
</body>
</html>
