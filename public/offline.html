<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2563eb">
    <title>Oasis Hotel Offline</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top right, rgba(59, 130, 246, .18), transparent 34rem),
                #f8fafc;
            color: #0f172a;
        }
        main {
            width: min(100%, 580px);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            background: rgba(255, 255, 255, .97);
            padding: 42px;
            text-align: center;
            box-shadow: 0 32px 80px -48px rgba(15, 23, 42, .6);
        }
        .logo-shell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
            height: 56px;
            margin-bottom: 26px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #fff;
            padding: 10px 16px;
            box-shadow: 0 16px 32px -24px rgba(15, 23, 42, .55);
        }
        .logo-shell img { display: block; width: 118px; max-height: 34px; object-fit: contain; }
        .status-icon {
            width: 58px;
            height: 58px;
            margin: 0 auto 18px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: #eff6ff;
            color: #2563eb;
            font-size: 25px;
            font-weight: 700;
        }
        .eyebrow {
            margin: 0 0 8px;
            color: #2563eb;
            font-size: 13px;
            font-weight: 650;
        }
        h1 {
            margin: 0;
            font-size: clamp(29px, 6vw, 38px);
            line-height: 1.08;
            letter-spacing: -.04em;
        }
        p {
            margin: 16px auto 0;
            max-width: 455px;
            color: #64748b;
            font-size: 15px;
            line-height: 1.7;
        }
        button {
            min-height: 48px;
            margin-top: 28px;
            border: 0;
            border-radius: 13px;
            background: #2563eb;
            color: #fff;
            padding: 13px 24px;
            font-size: 14px;
            font-weight: 650;
            cursor: pointer;
            box-shadow: 0 14px 28px -18px rgba(37, 99, 235, .95);
            transition: background .2s ease, transform .2s ease;
        }
        button:hover { background: #1d4ed8; transform: translateY(-1px); }
        small {
            display: block;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.5;
        }
        @media (max-width: 520px) {
            main { padding: 34px 22px; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <main>
        <div class="logo-shell"><img src="/logo.svg" alt="Oasis Hotel & Resort"></div>
        <div class="status-icon" aria-hidden="true">!</div>
        <p class="eyebrow">You are currently offline</p>
        <h1>Connection unavailable</h1>
        <p>
            Previously opened pages may still be available from the device cache. Booking, payment,
            check-in, and hotel staff operations require an active server connection.
        </p>
        <button type="button" onclick="window.location.reload()">Try again</button>
        <small>Oasis Hotel &amp; Resort · Offline fallback</small>
    </main>
</body>
</html>
