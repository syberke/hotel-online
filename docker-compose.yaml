version: '3.8'

services:
  # Kluster Aplikasi Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www
      # TAMBAHKAN BARIS INI: Mengamankan folder build agar tidak tertimpa folder lokal host
      - oasis_vite_assets:/var/www/public/build
    depends_on:
      - db
    networks:
      - oasis_ujikom_net

  # Container Load Balancer Nginx
  loadbalancer:
    image: nginx:alpine
    container_name: oasis_loadbalancer_8080
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      # TAMBAHKAN BARIS INI JUGA: Agar Nginx bisa membaca aset CSS/JS yang sama dari named volume
      - oasis_vite_assets:/var/www/public/build:ro
      - ./docker-compose/nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - oasis_ujikom_net

  # Container Database Engine
  db:
    image: postgres:16-alpine
    container_name: oasis_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: oasis_db
      POSTGRES_USER: oasis_admin
      POSTGRES_PASSWORD: SecretPassword123
    volumes:
      - oasis_db_persistent_data:/var/lib/postgresql/data
    networks:
      - oasis_ujikom_net

networks:
  oasis_ujikom_net:
    driver: bridge

volumes:
  oasis_db_persistent_data:
    driver: local
  # DAFTARKAN VOLUME BARU DI SINI
  oasis_vite_assets:
    driver: local