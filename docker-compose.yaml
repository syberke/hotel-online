services:
  web1:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./docker-compose/web-content/web1:/usr/local/apache2/htdocs:ro
    networks:
      - oasis_ujikom_net

  web2:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./docker-compose/web-content/web2:/usr/local/apache2/htdocs:ro
    networks:
      - oasis_ujikom_net

  web3:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./docker-compose/web-content/web3:/usr/local/apache2/htdocs:ro
    networks:
      - oasis_ujikom_net

  loadbalancer:
    image: nginx:alpine
    container_name: oasis_loadbalancer_8080
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker-compose/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker-compose/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web1
      - web2
      - web3
    networks:
      - oasis_ujikom_net

  db:
    image: postgres:16-alpine
    container_name: oasis_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: oasis_db
      POSTGRES_USER: oasis_admin
      POSTGRES_PASSWORD: SecretPassword123
    volumes:
      - oasis_db_persistent_data:/var/lib/postgresql/data
    networks:
      - oasis_ujikom_net

networks:
  oasis_ujikom_net:
    driver: bridge

volumes:
  oasis_db_persistent_data:
    driver: local