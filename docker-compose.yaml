x-web: &web
  build:
    context: .
    dockerfile: Dockerfile
    args:
      APP_BUILD_REVISION: ${APP_BUILD_REVISION:-local}
  image: oasis-hotel-web:latest
  restart: unless-stopped
  env_file:
    - ${OASIS_ENV_FILE:-.env}
    - /etc/oasis-hotel/database.env
  environment: &web-environment
    APP_ENV: production
    APP_DEBUG: "false"
    APP_URL: ${DOCKER_APP_URL:-http://localhost:8080}
    DB_CONNECTION: mysql
    DB_HOST: database
    DB_PORT: 3306
  networks:
    - hotel_internal
  depends_on:
    database:
      condition: service_healthy
  volumes:
    - hotel_public_storage:/var/www/html/storage/app/public
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://localhost/up"]
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 30s

services:
  web1:
    <<: *web
    environment:
      <<: *web-environment
      APP_NODE_NAME: Web 1
      APP_NODE_COLOR: "#0f766e"

  web2:
    <<: *web
    environment:
      <<: *web-environment
      APP_NODE_NAME: Web 2
      APP_NODE_COLOR: "#b45309"

  web3:
    <<: *web
    environment:
      <<: *web-environment
      APP_NODE_NAME: Web 3
      APP_NODE_COLOR: "#7e22ce"

  loadbalancer:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/load-balancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
      web3:
        condition: service_healthy
    networks:
      - hotel_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/lb-health"]
      interval: 10s
      timeout: 3s
      retries: 5

  database:
    image: mariadb:11.4
    restart: unless-stopped
    env_file:
      - /etc/oasis-hotel/database.env
    volumes:
      - hotel_database:/var/lib/mysql
    networks:
      - hotel_internal
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  hotel_internal:
    driver: bridge

volumes:
  hotel_database:
    driver: local
  hotel_public_storage:
    driver: local
