x-web: &web
  build:
    context: .
    dockerfile: Dockerfile
  image: oasis-hotel-web:latest
  restart: unless-stopped
  env_file: .env
  environment: &web-environment
    APP_ENV: production
    APP_DEBUG: "false"
    APP_URL: http://localhost:8080
    DB_CONNECTION: pgsql
    DB_HOST: database
    DB_PORT: 5432
    DB_DATABASE: ${DB_DATABASE:-oasis_hotel}
    DB_USERNAME: ${DB_USERNAME:-oasis_hotel}
    DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
  depends_on:
    database:
      condition: service_healthy
  networks:
    - hotel_internal
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://localhost/up"]
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 30s

services:
  web1:
    <<: *web
    environment:
      <<: *web-environment
      APP_NODE_NAME: Web 1
      APP_NODE_COLOR: "#0f766e"

  web2:
    <<: *web
    environment:
      <<: *web-environment
      APP_NODE_NAME: Web 2
      APP_NODE_COLOR: "#b45309"

  web3:
    <<: *web
    environment:
      <<: *web-environment
      APP_NODE_NAME: Web 3
      APP_NODE_COLOR: "#7e22ce"

  loadbalancer:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/load-balancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
      web3:
        condition: service_healthy
    networks:
      - hotel_internal

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-oasis_hotel}
      POSTGRES_USER: ${DB_USERNAME:-oasis_hotel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - hotel_database:/var/lib/postgresql/data
    networks:
      - hotel_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  hotel_internal:
    driver: bridge

volumes:
  hotel_database:
    driver: local
